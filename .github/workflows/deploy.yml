name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://studycafe.centralindia.cloudapp.azure.com/
    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -z "$VPS_SSH_KEY_B64" ]; then
            echo "::error::Missing VPS_SSH_KEY_B64 secret"
            exit 1
          fi

          printf '%s' "$VPS_SSH_KEY_B64" | base64 --decode > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub
          ssh-keygen -lf ~/.ssh/deploy_key.pub

      - name: Trust VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "::error::Missing VPS_HOST secret"
            exit 1
          fi

          ssh-keyscan -T 30 -p "$VPS_SSH_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Verify SSH connection
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          if [ -z "$VPS_USER" ]; then
            echo "::error::Missing VPS_USER secret"
            exit 1
          fi

          ssh -i ~/.ssh/deploy_key \
            -p "$VPS_SSH_PORT" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" "hostname && whoami"

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "$VPS_SSH_PORT" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" << 'EOF'
            set -e
            cd "${{ secrets.VPS_PROJECT_DIR }}"
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            docker compose --env-file env.prod -f docker-compose.prod.yml up -d --build
            docker compose --env-file env.prod -f docker-compose.prod.yml ps
            curl -fsS http://127.0.0.1:8088/ >/dev/null
            curl -fsS http://127.0.0.1:5173/ >/dev/null
            docker image prune -f
          EOF
