
services:
  # ─── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: studycafe-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studycafe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studycafe123}
      POSTGRES_DB: ${POSTGRES_DB:-studycafe}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studycafe -d studycafe"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: studycafe-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-studycafe}:${POSTGRES_PASSWORD:-studycafe123}@db:5432/${POSTGRES_DB:-studycafe}
      CORS_ORIGINS: ${CORS_ORIGINS:-"http://localhost:5173,http://localhost:3000"}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-""}
    ports:
      - "8088:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/').read()\" >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ─── Mock Data Seeder ─────────────────────────────────────
  mock-data:
    image: curlimages/curl:8.7.1
    container_name: studycafe-mock-data
    depends_on:
      backend:
        condition: service_healthy
    command: ["-fsS", "-X", "POST", "http://backend:8000/api/mock-data/import"]
    restart: "no"

  # ─── React Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: studycafe-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: "http://localhost:8088"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
