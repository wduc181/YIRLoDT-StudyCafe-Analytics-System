
services:
  # ─── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: studycafe-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: studycafe
      POSTGRES_PASSWORD: studycafe123
      POSTGRES_DB: studycafe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studycafe -d studycafe"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: studycafe-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://studycafe:studycafe123@db:5432/studycafe
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
      GOOGLE_PLACES_API_KEY: ""
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
